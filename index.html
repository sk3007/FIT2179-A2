<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src ="https://cdn.jsdelivr.net/npm/vega@5.20.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5.1.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6.17.0"></script>
    <script src="js/chart_embed.js"></script>

    <script src="https://code.highcharts.com/highcharts.js"> </script>
    <script src="https://code.highcharts.com/modules/heatmap.js"></script>
    <script src="https://code.highcharts.com/modules/treemap.js"></script>
    <script src="js/chart_treemap.js"></script>

    <link rel="stylesheet" type="text/css" href="styles/styles.css">

    <title>Climate Change in Malaysia: Causes and Impacts</title>
</head>

<body>
    <h1>Climate Change in Malaysia: Causes and Impacts</h1>
    <div class="container">
        <div class="section-container">
            <div id="chart1" class="full-width"></div>
        </div>
        <div id="causes" class="section-container">
            <div id="chart2" class="half-width"></div>
            <!-- <div id="chart3"></div> -->
            <div id="chart4" class="half-width"></div>
        </div>
        <div id="observations" class="section-container">
            <div id="chart5" class="half-width"></div>
            <div id="chart6" class="half-width"></div>
        </div>
        <div id="effects" class="section-container">
            <div id="disaster-displacements" class="section-internal-container">
                <div id="chart7" class="half-width"></div>
                <div id="chart8" class="half-width"></div>
            </div>
            <div id="other-effects" class="section-internal-container">
                <div id="chart9" class="half-width"></div>
                <div id="chart10" class="half-width"></div>
            </div>
        </div>
        <div id="outlook" class="section-container">
            <div id="power-stations" class="section-internal-container">
                <div id="chart12" class="full-width"></div>
            </div>
            <div id="renewable-energy" class="section-internal-container">
                <div id="chart13"></div>
                <div id="chart14"></div>
            </div>
            <div id="economy" class="section-internal-container">
                <div id="chart_treemap" class="full-width"></div>
            </div>
        </div>
        <script>
        document.addEventListener('DOMContentLoaded', function () {
            window.initTreemap('chart_treemap');
        });
        </script>
    </div>
    
</body>

</html>
